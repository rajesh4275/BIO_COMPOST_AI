<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Bio-Compose AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 40px 0;
        }

        .auth-card {
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        .auth-header {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-bottom: 2px solid rgba(16, 185, 129, 0.3);
            text-align: center;
        }

        .auth-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #10b981;
            margin-bottom: 8px;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
        }

        .form-label {
            font-size: 0.9rem;
            color: #ffffff;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-control {
            background-color: #0f172a;
            border: 2px solid #334155;
            color: #ffffff;
            border-radius: 10px;
            padding: 12px;
            font-weight: 500;
        }

        .form-control::placeholder { color: #64748b; }

        .form-control:focus {
            background-color: #0f172a;
            border-color: #10b981;
            color: #ffffff;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.2);
        }

        .btn-primary {
            background: #10b981;
            border: none;
            font-weight: 700;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background: #059669;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .auth-link {
            color: #10b981;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .auth-link:hover {
            color: #34d399;
            text-decoration: underline;
        }

        .alert {
            border-radius: 10px;
            font-weight: 500;
            border: 1px solid transparent;
        }
        
        .alert-danger {
            background-color: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.4);
            color: #fca5a5;
        }

        .alert-success {
            background-color: rgba(16, 185, 129, 0.15);
            border-color: rgba(16, 185, 129, 0.4);
            color: #a7f3d0;
        }
    </style>
</head>
<body>

<div class="container" style="max-width: 450px;">
    <div class="auth-card">
        <div class="auth-header">
            <h1><i class="fas fa-user-plus me-2"></i>Create Account</h1>
            <p class="text-white opacity-75 mb-0">Join Bio-Compose AI System</p>
        </div>
        
        <div class="p-4">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} mb-4" role="alert">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-secondary"><i class="fas fa-user"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-secondary"><i class="fas fa-lock"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="Create password" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Confirm Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-secondary"><i class="fas fa-shield-halved"></i></span>
                        <input type="password" name="confirm_password" class="form-control" placeholder="Repeat password" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100">Register</button>
            </form>

            <div class="auth-footer text-white opacity-75">
                Already have an account? <a href="/login" class="auth-link">Login here</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
