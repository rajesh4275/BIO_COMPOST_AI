<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Compose | Midnight AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 40px 0;
        }

        .app-card {
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        .app-header {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-bottom: 2px solid rgba(16, 185, 129, 0.3);
            text-align: center;
        }

        .app-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #10b981; /* High-contrast Emerald */
            margin-bottom: 8px;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
        }

        .section-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #10b981; /* Changed to Emerald for visibility */
            font-weight: 700;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
        }

        .form-label {
            font-size: 0.95rem;
            color: #ffffff; /* Pure white for visibility */
            font-weight: 600;
            margin-bottom: 10px;
        }

        .form-control {
            background-color: #0f172a;
            border: 2px solid #334155;
            color: #ffffff;
            border-radius: 10px;
            padding: 12px;
            font-weight: 500;
        }

        .form-control::placeholder { color: #64748b; }

        .form-control:focus {
            background-color: #0f172a;
            border-color: #10b981;
            color: #ffffff;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.2);
        }

        .btn-primary {
            background: #10b981;
            border: none;
            font-weight: 700;
            padding: 16px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary:hover {
            background: #059669;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        .result-panel {
            background: rgba(16, 185, 129, 0.15);
            border: 2px solid #10b981;
            border-radius: 12px;
            padding: 30px;
            margin-top: 40px;
        }

        .data-label {
            font-size: 0.8rem;
            color: #ffffff;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
            opacity: 0.9;
        }

        .data-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: #ffffff;
        }

        .text-success-bright { color: #10b981 !important; }

    </style>
</head>
<body>

<div class="container" style="max-width: 850px;">
    <div class="app-card">
        <div class="app-header">
            <h1><i class="fas fa-microchip me-2"></i>WASTE TO WORTH USING AI</h1>
            <p class="text-white opacity-75 mb-0">Decomposition Analysis System</p>
        </div>
        
        <div class="p-4 p-md-5">
            <form method="POST">
                <div class="section-title">
                    <i class="fas fa-broadcast-tower me-2"></i> Sensor Telemetry
                </div>
                <div class="row g-4 mb-5">
                    <div class="col-md-3 col-6">
                        <label class="form-label">pH Level</label>
                        <input type="number" step="0.01" name="ph" class="form-control" placeholder="6.5" required>
                    </div>
                    <div class="col-md-3 col-6">
                        <label class="form-label">Temp (°C)</label>
                        <input type="number" step="0.01" name="temp" class="form-control" placeholder="35" required>
                    </div>
                    <div class="col-md-3 col-6">
                        <label class="form-label">Humidity (%)</label>
                        <input type="number" step="0.01" name="humidity" class="form-control" placeholder="70" required>
                    </div>
                    <div class="col-md-3 col-6">
                        <label class="form-label">Moisture (%)</label>
                        <input type="number" step="0.01" name="moisture" class="form-control" placeholder="55" required>
                    </div>
                </div>

                <div class="section-title">
                    <i class="fas fa-atom me-2"></i> Nutrient Values
                </div>
                <div class="row g-4">
                    <div class="col-md-4">
                        <label class="form-label">Nitrogen (N)</label>
                        <input type="number" name="n" class="form-control" placeholder="Value" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Phosphorus (P)</label>
                        <input type="number" name="p" class="form-control" placeholder="Value" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Potassium (K)</label>
                        <input type="number" name="k" class="form-control" placeholder="Value" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100">classify & predict</button>
            </form>

            {% if days %}
            <div class="result-panel">
                <div class="row text-center">
                    <div class="col-md-6 border-end" style="border-color: rgba(255,255,255,0.2) !important;">
                        <div class="data-label">Waste Category</div>
                        <div class="data-value text-success-bright">{{ category }}</div>
                    </div>
                    <div class="col-md-6">
                        <div class="data-label">Predicted Readiness</div>
                        <div class="data-value">{{ days }} <span class="h5">Days</span></div>
                    </div>
                </div>
            </div>
            {% endif %}
        </div>
    </div>
</div>

</body>
</html>
